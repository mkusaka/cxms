name: CodSpeed Performance Monitoring
on:
  push:
    branches: [main, codespeed]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/codspeed.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/codspeed.yml'
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  benchmarks:
    name: Run CodSpeed Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-codspeed
      - name: Build benchmarks
        run: cargo codspeed build
      - name: Run benchmarks
        id: codspeed
        continue-on-error: true
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          run: cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
      - name: Report CodSpeed upload failure
        if: ${{ steps.codspeed.outcome == 'failure' }}
        run: |
          echo "CodSpeed benchmarks completed but upload failed." >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow is non-blocking until CODSPEED_TOKEN access is fixed." >> "$GITHUB_STEP_SUMMARY"
    permissions: {}
    timeout-minutes: 60
    environment: codspeed
permissions: {}
